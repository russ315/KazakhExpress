name: test-report

on:
  workflow_dispatch:

jobs:
  backend-test-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: KazakhExpress

      - uses: actions/checkout@v4
        with:
          repository: maqsatto/kazakhexpress-proto
          path: kazakhexpress-proto
          ref: ${{ github.ref_name == 'feat/maqsat-commits' && 'feat/maqsat-commits' || 'main' }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Run unit + integration tests and build report
        working-directory: KazakhExpress
        run: bash scripts/run-all-tests.sh

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-report
          path: KazakhExpress/docs/test-execution-report.md

      - name: Stop services
        if: always()
        working-directory: KazakhExpress
        run: docker compose down -v --remove-orphans
