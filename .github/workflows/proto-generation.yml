name: proto-generation

on:
  workflow_dispatch:

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: KazakhExpress

      - uses: actions/checkout@v4
        with:
          repository: maqsatto/kazakhexpress-proto
          path: kazakhexpress-proto
          ref: ${{ github.ref_name == 'feat/maqsat-commits' && 'feat/maqsat-commits' || 'main' }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        working-directory: kazakhexpress-proto
        run: buf lint

      - name: Buf generate
        working-directory: kazakhexpress-proto
        run: buf generate

      - name: Proto unit tests
        working-directory: kazakhexpress-proto
        run: go test ./...

      - name: Verify generated files are committed
        working-directory: kazakhexpress-proto
        run: git diff --exit-code
