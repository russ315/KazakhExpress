global:
  scrape_interval: 10s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8080"]
  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets: ["payment-service:8083"]
  - job_name: product-service
    metrics_path: /metrics
    static_configs:
      - targets: ["product-service:8084"]
  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:8082"]
  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8081"]
  - job_name: review-service
    metrics_path: /metrics
    static_configs:
      - targets: ["review-service:9106"]
  - job_name: smtp-service
    metrics_path: /metrics
    static_configs:
      - targets: ["smtp-service:9104"]
  - job_name: nats
    static_configs:
      - targets: ["nats-exporter:7777"]
