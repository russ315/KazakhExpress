syntax = "proto3";

package kazakhexpress.review.v1;

option go_package = "kazakhexpress/review-service/internal/reviewv1;reviewv1";

service ReviewService {
  rpc CreateReview(CreateReviewRequest) returns (Review);
  rpc GetReview(GetReviewRequest) returns (Review);
  rpc ListProductReviews(ListProductReviewsRequest) returns (ListProductReviewsResponse);
  rpc UpdateReview(UpdateReviewRequest) returns (Review);
  rpc DeleteReview(DeleteReviewRequest) returns (DeleteReviewResponse);
  rpc GetProductRating(GetProductRatingRequest) returns (ProductRating);
}

message Review {
  string id = 1;
  string product_id = 2;
  string user_id = 3;
  string order_id = 4;
  int32 rating = 5;
  string body = 6;
  int32 helpful_count = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ProductRating {
  string product_id = 1;
  double rating_avg = 2;
  int32 rating_count = 3;
}

message CreateReviewRequest {
  string product_id = 1;
  string user_id = 2;
  string order_id = 3;
  int32 rating = 4;
  string body = 5;
}

message GetReviewRequest {
  string review_id = 1;
}

message ListProductReviewsRequest {
  string product_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListProductReviewsResponse {
  repeated Review reviews = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total = 4;
}

message UpdateReviewRequest {
  string review_id = 1;
  optional int32 rating = 2;
  optional string body = 3;
}

message DeleteReviewRequest {
  string review_id = 1;
}

message DeleteReviewResponse {}

message GetProductRatingRequest {
  string product_id = 1;
}
