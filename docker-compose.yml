services:
  postgres:
    image: postgres:17
    container_name: kazakhexpress-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kazakhexpress
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./order-service/migrations/001_create_orders.sql:/docker-entrypoint-initdb.d/000_create_orders.sql:ro
      - ./payment-service/migrations/001_create_payments.sql:/docker-entrypoint-initdb.d/001_create_payments.sql:ro
      - ./payment-service/migrations/002_extend_payments.sql:/docker-entrypoint-initdb.d/002_extend_payments.sql:ro
      - ./user-service/migrations/001_create_users.sql:/docker-entrypoint-initdb.d/003_create_users.sql:ro
      - ./user-service/migrations/002_create_refresh_tokens.sql:/docker-entrypoint-initdb.d/004_create_refresh_tokens.sql:ro
      - ./user-service/migrations/003_create_token_blacklist.sql:/docker-entrypoint-initdb.d/005_create_token_blacklist.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kazakhexpress"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: kazakhexpress-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kazakhexpress-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.2.0
    container_name: kazakhexpress-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      postgres:
        condition: service_healthy

  smtp-service:
    build:
      context: ..
      dockerfile: KazakhExpress/smtp-service/Dockerfile
    container_name: kazakhexpress-smtp-service
    environment:
      SMTP_GRPC_PORT: "9094"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@kazakhexpress.kz}
  payment-service:
    build:
      context: ..
      dockerfile: KazakhExpress/payment-service/Dockerfile
    container_name: kazakhexpress-payment-service
    environment:
      PAYMENT_GRPC_PORT: "9093"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kazakhexpress?sslmode=disable
      REDIS_ADDR: redis:6379
      MESSAGE_BROKER: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: kazakhexpress.events
      SMTP_GRPC_ADDR: smtp-service:9094
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      smtp-service:
        condition: service_started

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: kazakhexpress-order-service
    environment:
      ORDER_SERVICE_PORT: "8082"
      ORDER_GRPC_PORT: "9092"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kazakhexpress?sslmode=disable
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: kazakhexpress.events
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: kazakhexpress-user-service
    environment:
      USER_SERVICE_PORT: "8081"
      USER_SERVICE_GRPC_PORT: "9095"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kazakhexpress?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  api-gateway:
    build:
      context: ..
      dockerfile: KazakhExpress/api-gateway/Dockerfile
    container_name: kazakhexpress-api-gateway
    environment:
      API_GATEWAY_PORT: "8080"
      PAYMENT_GRPC_ADDR: payment-service:9093
      USER_GRPC_ADDR: user-service:9095
      ORDER_GRPC_ADDR: order-service:9092
      GIN_MODE: release
    ports:
      - "8080:8080"
    depends_on:
      payment-service:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started

volumes:
  postgres-data:
  grafana-data:
